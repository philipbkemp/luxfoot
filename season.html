<!DOCTYPE html>
<html>
    <head>
        <title>LuxFoot | Seasons</title>
        <link href="styles.css" rel="stylesheet" />
        <link rel="icon" type="image/x-icon" href="favicon.png" />
    </head>
    <body class="hasNav">
        <div class="nav">
            <h1>
                <a href="index.html">Luxembourgish Football</a>: <a href="seasons.html">Seasons</a>: 
            </h1>
            <p id="prev-next">
                
            </p>
        </div>
        
        <script>
            params=[];
            window.location.search.replace("?","").split("&").forEach(param=>{parts=param.split("=");params[parts[0]]=parts[1];});
            season = params.year;
            seasonPath = [season[0]+""+season[1],season[2],season[3]+"-"+season.split("-")[1]];

            keys = [];

            fetch("data/"+seasonPath.join("/")+".json")
                .then(response => {
                    if ( ! response.ok ) {
                        errorP = document.createElement("P");
                        errorP.classList.add("error");
                        errorP.textContent = "Season not found";
                        document.body.append(errorP);
                        return {"invalid":true};
                    }
                    return response.json();
                })
                .then(data => {
                    if ( data.invalid ) {
                        return;
                    }

                    console.log(data);
                    keys = [...keys,Object.keys(data)];

                    document.getElementsByTagName("H1")[0].innerHTML += data.season;
                    keys = keys.filter(key => key !== 'season');

                    prevNext = document.getElementById("prev-next");
                    if ( data.prev ) {
                        goPrev = document.createElement("A");
                        goPrev.href = "season.html?year="+data.prev;
                        goPrev.innerHTML = data.prev;
                        prevNext.append(goPrev);
                    }
                    if ( data.prev && data.next ) {
                        prevNext.append(" | ");
                    }
                    if ( data.next ) {
                        goNext = document.createElement("A");
                        goNext.href = "season.html?year="+data.next;
                        goNext.innerHTML = data.next;
                        prevNext.append(goNext);
                    }
                    keys = keys.filter(key => key !== 'next');
                    keys = keys.filter(key => key !== 'prev');

                    if ( keys.length !== 0 ) {
                        console.error("Remaining Keys: ",keys);
                    }
                });
        </script>
    </body>
</html>
