<!DOCTYPE html>
<html>
    <head>
        <title>LuxFoot | Seasons</title>
        <link href="styles.css" rel="stylesheet" />
        <link rel="icon" type="image/x-icon" href="favicon.png" />
    </head>
    <body class="hasNav">
        <div class="nav">
            <h1>
                <a href="index.html">Luxembourgish Football</a>: <a href="seasons.html">Seasons</a>: 
            </h1>
            <ul id="prev-next"></ul>
            <ul id="competitions"></ul>
        </div>

        <div id="dataContainer"></div>
        
        <script>
            params=[];
            window.location.search.replace("?","").split("&").forEach(param=>{parts=param.split("=");params[parts[0]]=parts[1];});
            season = params.year;
            seasonPath = [season[0]+""+season[1],season[2],season[3]+"-"+season.split("-")[1]];
            showComp = params.comp ?? "league:1";
            compNav = document.getElementById("competitions");

            keys = [];
            allTeams = null;

            intPlayers = null;

            contentShown = false;

            fetch("data/teams.json")
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    allTeams = data;
                    return fetch("data/intplayers.json");
                })
                .then(response=>{
                    return response.json();
                })
                .then(data=>{
                    intPlayers = data;
                    return fetch("data/"+seasonPath.join("/")+".json");
                })
                .then(response => {
                    if ( ! response.ok ) {
                        errorP = document.createElement("P");
                        errorP.classList.add("error");
                        errorP.textContent = "Season not found";
                        document.body.append(errorP);
                        return {"invalid":true};
                    }
                    return response.json();
                })
                .then(data => {
                    if ( data.invalid ) {
                        return;
                    }

                    keys = [...keys,...Object.keys(data)];

                    document.getElementsByTagName("H1")[0].innerHTML += data.season;
                    document.title += " | " + data.season;
                    keys = keys.filter(key => key !== 'season');

                    prevNext = document.getElementById("prev-next");
                    if ( data.prev ) {
                        goPrev = document.createElement("A");
                        goPrev.href = "season.html?year="+data.prev+"&comp="+showComp;
                        goPrev.innerHTML = data.prev;
                        goPrevLi = document.createElement("LI");
                        goPrevLi.append(goPrev);
                        prevNext.append(goPrevLi);
                    }
                    if ( data.next ) {
                        goNext = document.createElement("A");
                        goNext.href = "season.html?year="+data.next+"&comp="+showComp;
                        goNext.innerHTML = data.next;
                        goNextLi = document.createElement("LI");
                        goNextLi.append(goNext);
                        prevNext.append(goNextLi);
                    }
                    keys = keys.filter(key => key !== 'next');
                    keys = keys.filter(key => key !== 'prev');

                    playoffsNeeded = [];
                    playoffsReallyNeeded = [];

                    if ( data.league ) {
                        data.league.forEach(league=>{
                            playoffsNeeded = [...playoffsNeeded,...drawLeague(league,"league")];
                        });
                        keys = keys.filter(key => key !== 'league');
                    }

                    if ( data.playoffs ) {
                        keys = keys.filter(key => key !== 'playoffs');
                        playoffsNeeded.forEach(pon=>{
                            if ( pon.indexOf("|") !== -1 ) {
                                pon.split("|").forEach(pon_a=>{
                                    if ( ! playoffsReallyNeeded.includes(pon_a) ) {
                                        playoffsReallyNeeded.push(pon_a);
                                    }
                                });
                            } else {
                                if ( ! playoffsReallyNeeded.includes(pon) ) {
                                    playoffsReallyNeeded.push(pon);
                                }
                            }
                        });

                        Object.keys(data.playoffs).forEach(po=>{
                            drawPlayoff(po,data.playoffs[po],playoffsReallyNeeded.includes(po),"playoffs."+po);
                            playoffsReallyNeeded = playoffsReallyNeeded.filter(key => key !== po);
                        });
                    }

                    if ( data.international ) {
                        keys = keys.filter(key => key !== 'international');
                        Object.keys(data.international).forEach(int=>{
                            drawInternational(int,data.international[int]);
                        });
                    }

                    if ( ! contentShown ) {
                        errorP = document.createElement("P");
                        errorP.classList.add("error");
                        errorP.textContent = "Competition not found";
                        document.body.append(errorP);
                    }

                    if ( keys.length !== 0 ) {
                        console.error(keys.join(", "));
                        console.log(data);
                    }
                    if ( playoffsReallyNeeded.length !== 0 ) {
                        console.error("PLAYOFFS MISSING",playoffsReallyNeeded.join(", "));
                        console.log(data.playoffs);
                    }
                });
            
            function drawInternational(intKey,intData) {
                keys = [...keys,...Object.keys(intData).map(key => `international.${intKey}.${key}`)];
                keys = keys.filter(key => key !== `international.${intKey}.matches`);

                thisComp = "international:" + intKey;
                thisLeagueNav = document.createElement("A");
                thisLeagueNav.href = "season.html?year="+season+"&comp="+thisComp;
                switch ( intKey ) {
                    case "men":
                        thisLeagueNav.innerHTML = "Men's National Team";
                        keys = keys.filter(key => key !== 'international.men');
                        break;
                }
                if ( thisComp === showComp ) {
                    thisLeagueNav.classList.add("active");
                }
                thisLeagueNavLi = document.createElement("LI");
                thisLeagueNavLi.append(thisLeagueNav);
                compNav.append(thisLeagueNavLi);

                if ( showComp !== thisComp ) {
                    return;
                }
                contentShown = true;

                if ( intData.matches ) {

                    matchesTitle = document.createElement("H3");
                    matchesTitle.innerHTML = "Matches";
                    dataContainer.append(matchesTitle);
                    drawMatches(intData.matches,`international.${intKey}`,{"type":"international"},true);
                }
            }
            
            function drawPlayoff(code,po,isShown,keyPrefix) {
                keys = [...keys,...Object.keys(po).map(key => `${keyPrefix}.${key}`)];
                keys = keys.filter(key => key !== `${keyPrefix}.matches`);

                if ( ! isShown ) {
                    return;
                }

                playoffTitle = document.createElement("H2");
                playoffTitle.innerHTML = getPlayoffName(code);
                dataContainer.append(playoffTitle);

                if ( po.matches ) {
                    drawMatches(po.matches,keyPrefix+".matches",{"type":"playoff","playoff":code});
                }
            }

            function drawMatches(matches,keyPrefix,comp,hasIntData=false) {
                dataContainer = document.getElementById("dataContainer");

                table = document.createElement("TABLE");
                table.classList.add("matches");
                if ( hasIntData ) {
                    table.classList.add("matches--extradata");
                }

                hasDates = false;
                hasNotes = false;

                matches.forEach(match=>{
                    keys = [...keys,...Object.keys(match).map(key => `${keyPrefix}.${key}`)];
                    keys = keys.filter(key => key !== `${keyPrefix}.date`);
                    keys = keys.filter(key => key !== `${keyPrefix}.home`);
                    keys = keys.filter(key => key !== `${keyPrefix}.away`);
                    keys = keys.filter(key => key !== `${keyPrefix}.score`);
                    keys = keys.filter(key => key !== `${keyPrefix}.season`);
                    keys = keys.filter(key => key !== `${keyPrefix}.outcome`);
                    keys = keys.filter(key => key !== `${keyPrefix}.forfeit`);

                    if ( hasIntData ) {
                        keys = keys.filter(key => key !== `${keyPrefix}.goals`);
                        keys = keys.filter(key => key !== `${keyPrefix}.stadium`);
                        keys = keys.filter(key => key !== `${keyPrefix}.location`);
                        keys = keys.filter(key => key !== `${keyPrefix}.attendance`);
                        keys = keys.filter(key => key !== `${keyPrefix}.result`);
                    }

                    if ( match.competition ) {
                        keys = [...keys,...Object.keys(match.competition).map(key => `${keyPrefix}.competition.${key}`)];
                        keys = keys.filter(key => key !== `${keyPrefix}.competition`);
                        if ( match.competition.type === "playoff" ) {
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.type`);
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.playoff`);
                        } else if ( match.competition.type === "international" ) {
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.type`);
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.international`);
                        }
                    }

                    tr = document.createElement("TR");

                    tdDate = document.createElement("TD");
                    tdDate.innerHTML = "";
                    if ( match.date ) {
                        tdDate.innerHTML = match.date;
                        hasDates = true;
                    }
                    tr.append(tdDate);

                    tdHome = document.createElement("TD");
                    tdHome.innerHTML = allTeams[match.home].name;
                    tr.append(tdHome);

                    tdScore = document.createElement("TD");
                    if ( match.result ) {
                        switch(match.result) {
                            case "W": tdScore.classList.add("match-iswin"); break;
                            case "D": tdScore.classList.add("match-isdraw"); break;
                            case "L": tdScore.classList.add("match-isloss"); break;
                        }
                    }
                    if ( match.forfeit ) {
                        tdScoreFF = document.createElement("ABBR");
                        tdScoreFF.title = "Match forfeited";
                        tdScoreFF.innerHTML = match.score;
                        tdScore.append(tdScoreFF);
                    } else {
                        tdScore.innerHTML = match.score;
                    }
                    tr.append(tdScore);

                    tdAway = document.createElement("TD");
                    tdAway.innerHTML = allTeams[match.away].name;
                    tr.append(tdAway);

                    if ( season !== match.season ) {
                        console.warn("inconsistent season value",season,match.season);
                    }

                    if ( comp.type === "international" ) {
                        // no checks
                    } else if ( comp.type === "playoff" && comp.playoff !== match.competition.playoff ) {
                        console.warn("inconsistent playoff competition",comp,match.competition.playoff);
                    } else if ( ! ["international","playoff"].includes(comp.type)) {
                        console.warn("validate match competition data",comp,match.competition);
                    }

                    tdNotes = document.createElement("TD");
                    tdNotes.innerHTML = "";
                    if ( match.outcome ) {
                        tdNotes.innerHTML = match.outcome
                            .replaceAll(match.home,allTeams[match.home].name)
                            .replaceAll(match.away,allTeams[match.away].name)
                            ;
                        hasNotes = true;
                    }
                    tr.append(tdNotes);

                    table.append(tr);

                    if ( hasIntData ) {

                        hasNotes = true;
                        tdNotes.innerHTML = match.stadium + ", " + match.location;

                        trTwo = document.createElement("TR");

                        tdComp = document.createElement("TD");
                        tdComp.innerHTML = match.competition.international;
                        trTwo.append(tdComp);

                        tdGoalsHome = document.createElement("TD");
                        tdGoalsSpacer = document.createElement("TD");
                        tdGoalsAway = document.createElement("TD");

                        match.goals.forEach(g=>{
                            keys = [...keys,...Object.keys(g).map(key => `${keyPrefix}.goals.${key}`)];

                            tdGoalsSpacer.innerHTML += g.min + "<br />";

                            playerEntry = g.player;
                            if ( g.team === "_LUX" ) {
                                playerEntry = intPlayers[playerEntry].name[0][0] + " " + intPlayers[playerEntry].name[1];
                            }
                            if ( g.penalty ) {
                                playerEntry += " (pen)";
                            }

                            if ( g.team === match.home ) {
                                tdGoalsHome.innerHTML += playerEntry + "<br />";
                                tdGoalsAway.innerHTML += "" + "<br />";
                            } else {
                                tdGoalsAway.innerHTML += playerEntry + "<br />";
                                tdGoalsHome.innerHTML += "" + "<br />";
                            }

                            keys = keys.filter(key => key !== `${keyPrefix}.goals.min`);
                            keys = keys.filter(key => key !== `${keyPrefix}.goals.team`);
                            keys = keys.filter(key => key !== `${keyPrefix}.goals.player`);
                            keys = keys.filter(key => key !== `${keyPrefix}.goals.penalty`);
                        });

                        trTwo.append(tdGoalsHome);
                        trTwo.append(tdGoalsSpacer);
                        trTwo.append(tdGoalsAway);

                        tdMatchNotes = document.createElement("TD");
                        tdMatchNotes.innerHTML = "Attendance: " + match.attendance.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");;
                        trTwo.append(tdMatchNotes);

                        table.append(trTwo);

                        trThree = document.createElement("TR");

                        tdSquad = document.createElement("TD");
                        tdSquad.colSpan = 4;
                        tdSquad.innerHTML = "";
                        match.players.forEach(p=>{
                            keys = [...keys,...Object.keys(p).map(key => `${keyPrefix}.players.${key}`)];
                            keys = [...keys,...Object.keys(p.cap).map(key => `${keyPrefix}.players.cap.${key}`)];

                            tdSquad.innerHTML +=
                                (tdSquad.innerHTML === "" ? "" : "; ")
                                + intPlayers[p.player].name[0][0]
                                + " "
                                + intPlayers[p.player].name[1]
                                + (p.gk ? " (GK)" : "")
                                + (p.captain ? " (C)" : "")
                            ;

                            keys = keys.filter(key => key !== `${keyPrefix}.players.player`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.goals`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.cap`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.captain`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.gk`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.cap.competition`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.cap.opponent`);
                            keys = keys.filter(key => key !== `${keyPrefix}.players.cap.date`);
                            if ( p.cap.competition !== match.competition.international ) {
                                console.warn("Inconsistent international competition",p.cap.competition,match.competition.international);
                            }
                            if (
                                (match.home === "_LUX" && p.cap.opponent !== match.away )
                                || (match.away === "_LUX" && p.cap.opponent !== match.home )
                            ) {
                                console.warn("Inconsistent international opponent",p.cap.opponent,match.home,match.away);
                            }
                            if ( p.cap.date !== match.date ) {
                                console.warn("Inconsistent international date",p.cap.date,match.date);
                            }

                        });

                        tdEmpty1 = document.createElement("TD");
                        tdEmpty1.innerHTML = "";
                        trThree.append(tdEmpty1);
                        trThree.append(tdSquad);

                        table.append(trThree);
                    }
                });

                if ( ! hasNotes ) {
                    table.classList.add("notes__none");
                }
                if ( ! hasDates ) {
                    table.classList.add("dates__none");
                }

                dataContainer.append(table);
            }

            function drawLeague(league,keyPrefix) {
                keys = [...keys,...Object.keys(league).map(key => `${keyPrefix}.${key}`)];

                thisComp = "league:" + league.level;
                
                thisLeagueNav = document.createElement("A");
                thisLeagueNav.href = "season.html?year="+season+"&comp="+thisComp;
                thisLeagueNav.innerHTML = league.name;
                thisLeagueNavLi = document.createElement("LI");
                thisLeagueNavLi.append(thisLeagueNav);
                if ( thisComp === showComp ) {
                    thisLeagueNav.classList.add("active");
                }
                compNav.append(thisLeagueNavLi);

                keys = keys.filter(key => key !== `${keyPrefix}.name`);
                keys = keys.filter(key => key !== `${keyPrefix}.level`);
                keys = keys.filter(key => key !== `${keyPrefix}.note`);
                keys = keys.filter(key => key !== `${keyPrefix}.standings`);
                keys = keys.filter(key => key !== `${keyPrefix}.pts_win`);
                keys = keys.filter(key => key !== `${keyPrefix}.matches`);
                keys = keys.filter(key => key !== `${keyPrefix}.series`);

                if ( showComp !== thisComp ) {
                    return [];
                }
                contentShown = true;

                playoffsNeeded = [];
                dataContainer = document.getElementById("dataContainer");

                if ( ! league.series ) {
                    leagueName = document.createElement("H2");
                    leagueName.innerHTML = league.name;
                    dataContainer.append(leagueName);
                }

                if ( league.note ) {
                    note = document.createElement("P");
                    note.innerHTML = "Note: " + league.note;
                    dataContainer.append(note);
                }

                if ( league.pts_win ) {
                    notePts = document.createElement("P");
                    notePts.innerHTML = "Note: " + league.pts_win + " points for a win";
                    dataContainer.append(notePts);
                }

                if ( league.standings ) {
                    standingTitle = document.createElement("H3");
                    standingTitle.innerHTML = "Standings";
                    dataContainer.append(standingTitle);
                    playoffsNeeded = drawStandingsTable(league.standings,keyPrefix+".standings","league",league.level,league.name);
                }

                if ( league.matches ) {
                    matchesTitle = document.createElement("H3");
                    matchesTitle.innerHTML = "Matches";
                    dataContainer.append(matchesTitle);
                    expectedStandings = drawMatchesGrid(league.matches,keyPrefix+".matches","league",league.level,league.name);
                }

                if ( league.standings && league.matches ) {
                    const sorted1 = [...league.standings].sort((a, b) => a.team.localeCompare(b.team));
                    const sorted2 = Object.values(expectedStandings).sort((a, b) => a.team.localeCompare(b.team));
                    const standingsMatchGrid = sorted1.every((item, i) => {
                        const other = sorted2[i];
                        return (
                            item.team === other.team &&
                            item.w === other.w &&
                            item.d === other.d &&
                            item.l === other.l
                        );
                    });
                    if ( ! standingsMatchGrid ) {
                        console.error("Standings != Grid",sorted1,sorted2);
                    }
                }

                if ( league.series ) {
                    playoffsNeeded = drawSeries(league.series,keyPrefix+".series",league);
                }

                return playoffsNeeded;
            }

            function drawSeries(series,keyPrefix,league) {
                playoffsNeeded = [];

                series.forEach(serie=>{
                    keys = [...keys,...Object.keys(serie).map(key => `${keyPrefix}.${key}`)];

                    keys = keys.filter(key => key !== `${keyPrefix}.serie`);
                    keys = keys.filter(key => key !== `${keyPrefix}.name`);
                    keys = keys.filter(key => key !== `${keyPrefix}.pts_win`);
                    keys = keys.filter(key => key !== `${keyPrefix}.standings`);
                    keys = keys.filter(key => key !== `${keyPrefix}.matches`);

                    seriesName = document.createElement("H2");
                    seriesName.innerHTML = league.name + " " + serie.name;
                    dataContainer.append(seriesName);

                    if ( serie.standings ) {
                        standingTitle = document.createElement("H3");
                        standingTitle.innerHTML = "Standings";
                        dataContainer.append(standingTitle);
                        playoffsNeeded = [
                            ...playoffsNeeded,
                            ...drawStandingsTable(serie.standings,keyPrefix+".standings","league_series",league.level,seriesName.innerHTML,serie.serie)
                        ];
                    }
                    
                    if ( serie.matches ) {
                        matchesTitle = document.createElement("H3");
                        matchesTitle.innerHTML = "Matches";
                        dataContainer.append(matchesTitle);
                        expectedStandings = drawMatchesGrid(serie.matches,keyPrefix+".matches","league_series",league.level,seriesName.innerHTML,serie.serie)
                    }

                    if ( serie.standings && serie.matches ) {
                        const sorted1 = [...serie.standings].sort((a, b) => a.team.localeCompare(b.team));
                        const sorted2 = Object.values(expectedStandings).sort((a, b) => a.team.localeCompare(b.team));
                        const standingsMatchGrid = sorted1.every((item, i) => {
                            const other = sorted2[i];
                            return (
                                item.team === other.team &&
                                item.w === other.w &&
                                item.d === other.d &&
                                item.l === other.l
                            );
                        });
                        if ( ! standingsMatchGrid ) {
                            console.error("Standings != Grid",sorted1,sorted2);
                        }
                    }

                    if ( serie.pts_win !== league.pts_win ) {
                        console.warn("Inconsistent points per win definition",serie.pts_win,league.pts_win);
                    }
                });

                return playoffsNeeded;
            }

            function drawMatchesGrid(matches,keyPrefix,compType,compLevel,compName,compSeries=0) {
                grid = [];
                expectedStandings = [];

                matches.forEach(match=>{
                    keys = [...keys,...Object.keys(match).map(key => `${keyPrefix}.${key}`)];
                    keys = keys.filter(key => key !== `${keyPrefix}.home`);
                    keys = keys.filter(key => key !== `${keyPrefix}.away`);
                    keys = keys.filter(key => key !== `${keyPrefix}.score`);
                    keys = keys.filter(key => key !== `${keyPrefix}.season`);

                    if ( match.competition ) {
                        keys = [...keys,...Object.keys(match.competition).map(key => `${keyPrefix}.competition.${key}`)];
                        keys = keys.filter(key => key !== `${keyPrefix}.competition`);
                        if ( match.competition.type === "league" || match.competition.type === "league_series" ) {
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.type`);
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.level`);
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.league`);
                        }
                        if (match.competition.type === "league_series" ) {
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.series`);
                        }
                    }

                    if ( ! grid[match.home] ) {
                        grid[match.home] = [];
                    }
                    grid[match.home][match.away] = match.score;
                
                    if ( season !== match.season ) {
                        console.warn("inconsistent season value",season,match.season);
                    }
                    if ( compType !== match.competition.type ) {
                        console.warn("inconsistent competition type",compType,match.competition.type);
                    }
                    if ( (compType === "league" || compType === "league_series") && compLevel !== match.competition.level ) {
                        console.warn("inconsistent competition league level",compLevel,match.competition.level);
                    }
                    if ( (compType === "league" || compType === "league_series") && compName !== match.competition.league ) {
                        console.warn("inconsistent competition league name",compName,match.competition.league);
                    }
                    if ( compType === "league_series" && compSeries !== match.competition.series ) {
                        console.warn("inconsistent competition league series",compSeries,match.competition.series);
                    }

                    if ( ! expectedStandings[match.home] ) {
                        expectedStandings[match.home] = {};
                        expectedStandings[match.home].team = match.home;
                        expectedStandings[match.home].w = 0;
                        expectedStandings[match.home].d = 0;
                        expectedStandings[match.home].l = 0;
                        expectedStandings[match.home].f = 0;
                        expectedStandings[match.home].a = 0;
                    }
                    if ( ! expectedStandings[match.away] ) {
                        expectedStandings[match.away] = {};
                        expectedStandings[match.away].team = match.away;
                        expectedStandings[match.away].w = 0;
                        expectedStandings[match.away].d = 0;
                        expectedStandings[match.away].l = 0;
                        expectedStandings[match.away].f = 0;
                        expectedStandings[match.away].a = 0;
                    }
                    scoreParts = match.score.split("-");
                    homeScore = parseInt(scoreParts[0]);
                    awayScore = parseInt(scoreParts[1]);
                    expectedStandings[match.home].f += homeScore;
                    expectedStandings[match.home].a += awayScore;
                    expectedStandings[match.away].f += awayScore;
                    expectedStandings[match.away].a += homeScore;
                    if ( homeScore > awayScore ) {
                        expectedStandings[match.home].w++;
                        expectedStandings[match.away].l++;
                    } else if ( homeScore < awayScore ) {
                        expectedStandings[match.home].l++;
                        expectedStandings[match.away].w++;
                    } else {
                        expectedStandings[match.home].d++;
                        expectedStandings[match.away].d++;
                    }
                });

                dataContainer = document.getElementById("dataContainer");
                table = document.createElement("TABLE");
                table.classList.add("matchgrid");

                thead = document.createElement("THEAD");
                trHead = document.createElement("TR");
                thHome = document.createElement("TH");
                thHome.innerHTML = "";
                trHead.append(thHome);
                
                teams = Object.keys(grid).sort();
                teams.forEach(t=>{
                    thTeam = document.createElement("TH");
                    thTeam.innerHTML = "<abbr title='"+allTeams[t].name+"'>"+t+"</abbr>";
                    trHead.append(thTeam);
                });

                thead.append(trHead);
                table.append(thead);

                tbody = document.createElement("TBODY");
                teams.forEach(t=>{
                    tr = document.createElement("TR");
                    trTeam = document.createElement("TD");
                    trTeam.innerHTML = allTeams[t].name;
                    tr.append(trTeam);

                    teams.forEach(tt=>{
                        trMatch = document.createElement("TD");
                        trMatch.innerHTML = "-";
                        if ( t !== tt ) {
                            trMatch.innerHTML = grid[t][tt];
                        }
                        tr.append(trMatch);
                    });

                    tbody.append(tr);
                });
                table.append(tbody);

                dataContainer.append(table);

                return expectedStandings;
            }

            function drawStandingsTable(standings,keyPrefix,compType,compLevel,compName,compSeries=0) {
                dataContainer = document.getElementById("dataContainer");

                playoffsNeeded = [];

                table = document.createElement("TABLE");
                table.classList.add("standings");

                thead = document.createElement("THEAD");
                trHead = document.createElement("TR");
                thPlace = document.createElement("TH");
                thPlace.innerHTML = "#";
                trHead.append(thPlace);
                thTeam = document.createElement("TH");
                thTeam.innerHTML = "Team";
                trHead.append(thTeam);
                cols = ["P","W","D","L","F","A","Pts","GD"];
                colsAbbr = ["Played","Won","Drawn","Lost","For","Against","Points","Goal difference"];
                for ( i=0 ; i!==cols.length ; i++ ) {
                    thCol = document.createElement("TH");
                    thCol.innerHTML = "<abbr title='"+colsAbbr[i]+"'>"+cols[i]+"</abbr>";
                    trHead.append(thCol);
                }
                thNotes = document.createElement("TH");
                thNotes.innerHTML = "Notes";
                trHead.append(thNotes);
                thead.append(trHead);
                table.append(thead);

                hasNotes = false;

                totalWins = 0;
                totalDraws = 0;
                totalLosses = 0;
                totalFor = 0;
                totalAgainst = 0;

                tbody = document.createElement("TBODY");
                standings.forEach((standing,index)=>{
                    keys = [...keys,...Object.keys(standing).map(key => `${keyPrefix}.${key}`)];
                    keys = keys.filter(key => key !== `${keyPrefix}.place`);
                    keys = keys.filter(key => key !== `${keyPrefix}.team`);
                    keys = keys.filter(key => key !== `${keyPrefix}.missing`);
                    keys = keys.filter(key => key !== `${keyPrefix}.season`);
                    keys = keys.filter(key => key !== `${keyPrefix}.playoff`);
                    keys = keys.filter(key => key !== `${keyPrefix}.champion`);
                    keys = keys.filter(key => key !== `${keyPrefix}.w`);
                    keys = keys.filter(key => key !== `${keyPrefix}.d`);
                    keys = keys.filter(key => key !== `${keyPrefix}.l`);
                    keys = keys.filter(key => key !== `${keyPrefix}.f`);
                    keys = keys.filter(key => key !== `${keyPrefix}.a`);
                    keys = keys.filter(key => key !== `${keyPrefix}.pts_win`);
                    keys = keys.filter(key => key !== `${keyPrefix}.relegated`);
                    keys = keys.filter(key => key !== `${keyPrefix}.promoted`);

                    if ( standing.competition ) {
                        keys = [...keys,...Object.keys(standing.competition).map(key => `${keyPrefix}.competition.${key}`)];
                        keys = keys.filter(key => key !== `${keyPrefix}.competition`);
                        if ( standing.competition.type === "league" || standing.competition.type === "league_series" ) {
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.type`);
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.level`);
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.league`);
                        }
                        if ( standing.competition.type === "league_series" ) {
                            keys = keys.filter(key => key !== `${keyPrefix}.competition.series`);
                        }
                    }

                    tr = document.createElement("TR");

                    tdPlace = document.createElement("TD");
                    tdPlace.innerHTML = standing.place;
                    tr.append(tdPlace);

                    tdTeam = document.createElement("TD");
                    tdTeam.innerHTML = allTeams[standing.team].name;
                    tr.append(tdTeam);

                    if ( ! standing.missing ) {

                        tdP = document.createElement("TD");
                        tdP.innerHTML = standing.w + standing.d + standing.l;
                        tr.append(tdP);

                        tdW = document.createElement("TD");
                        tdW.innerHTML = standing.w;
                        tr.append(tdW);

                        tdD = document.createElement("TD");
                        tdD.innerHTML = standing.d;
                        tr.append(tdD);

                        tdL = document.createElement("TD");
                        tdL.innerHTML = standing.l;
                        tr.append(tdL);

                        tdF = document.createElement("TD");
                        tdF.innerHTML = standing.f;
                        tr.append(tdF);

                        tdA = document.createElement("TD");
                        tdA.innerHTML = standing.a;
                        tr.append(tdA);

                        tdPts = document.createElement("TD");
                        tdPts.innerHTML = (standing.w*(standing.pts_win?standing.pts_win:3))+standing.d;
                        tr.append(tdPts);

                        tdGd = document.createElement("TD");
                        tdGd.innerHTML = standing.f - standing.a;
                        tr.append(tdGd);

                        totalWins += standing.w;
                        totalDraws += standing.d;
                        totalLosses += standing.l;
                        totalFor += standing.f;
                        totalAgainst += standing.a;

                    } else {
                        tdMissing = document.createElement("TD");
                        tdMissing.innerHTML = "no data";
                        tdMissing.colSpan = cols.length;
                        tr.append(tdMissing);
                    }

                    tdNotes = document.createElement("TD");
                    tdNotes.innerHTML = "";
                    if ( standing.playoff ) {
                        tdNotes.innerHTML += (tdNotes.innerHTML !== "" ? " | " : "") + "-> " + getPlayoffName(standing.playoff);
                        playoffsNeeded.push(standing.playoff);
                        standing.playoff.split("|").forEach(poclass=>{
                            tr.classList.add("to-playoff--"+poclass);
                        });
                        hasNotes = true;
                    }
                    tr.append(tdNotes);

                    if ( standing.champion ) {
                        tr.classList.add("is-champion");
                        tdNotes.innerHTML += (tdNotes.innerHTML !== "" ? " | " : "") + "Champion";
                        hasNotes = true;
                    }

                    if ( standing.relegated ) {
                        tr.classList.add("is-relegated");
                        tdNotes.innerHTML += (tdNotes.innerHTML !== "" ? " | " : "") + "Relegated";
                        hasNotes = true;
                    }
                    if ( standing.promoted ) {
                        tr.classList.add("is-promoted");
                        tdNotes.innerHTML += (tdNotes.innerHTML !== "" ? " | " : "") + "Promoted";
                        hasNotes = true;
                    }

                    if ( (index+1) !== standing.place ) {
                        console.warn("inconsistent place value",index,standing.place);
                    }
                    if ( season !== standing.season ) {
                        console.warn("inconsistent season value",season,standing.season);
                    }
                    if ( compType !== standing.competition.type ) {
                        console.warn("inconsistent competition type",compType,standing.competition.type);
                    }
                    if ( (compType === "league" || compType === "league_series") && compLevel !== standing.competition.level ) {
                        console.warn("inconsistent competition league level",compLevel,standing.competition.level);
                    }
                    if ( (compType === "league" || compType === "league_series") && compName !== standing.competition.league ) {
                        console.warn("inconsistent competition league name",compName,standing.competition.league);
                    }
                    if ( compType === "league_series" && compSeries !== standing.competition.series ) {
                        console.warn("inconsistent competition league series",compSeries,standing.competition.series);
                    }

                    tbody.append(tr);
                });
                table.append(tbody);

                if ( ! hasNotes ) {
                    table.classList.add("notes__none");
                } else {
                    table.classList.add("notes__some");
                }

                if ( totalWins !== totalLosses ) {
                    console.error("Wins != Losses",totalWins,totalLosses);
                }
                if ( totalFor !== totalAgainst ) {
                    console.error("For != Against",totalFor,totalAgainst);
                }
                if ( totalDraws % 2 !== 0 ) {
                    console.error("Uneven number of draws",totalDraws);
                }

                dataContainer.append(table);

                return playoffsNeeded;
            }

            function getPlayoffName(po) {
                poName = po;

                switch (po) {
                    case "promotion_3":
                        poName = "Promotion playoff";
                        break;

                    case "title":
                        poName = "Title decider";
                        break;
                    
                    case "title_playoff":
                        poName = "Title playoff";
                        break;

                    default:
                        if ( po.indexOf("|") !== -1 ) {
                            return getPlayoffName(po.split("|")[0]);
                        } else {
                            console.warn("Unsupported playoff",po);
                        }
                }

                return poName;
            }
        </script>
    </body>
</html>
