<!DOCTYPE html>
<html>
    <head>
        <title>LuxFoot | Winners</title>
        <link href="assets/css/styles.css" rel="stylesheet" />
        <link rel="icon" type="image/x-icon" href="favicon.png" />
    </head>
    <body class="hasNav">
        <div class="nav">
            <h1>
                <a href="index.html">Luxembourgish Football</a>: Winners
            </h1>
            <ul id="competitions"></ul>
        </div>

        <div id="dataContainer"></div>
        
        <script src="assets/js/min/winners.min.js" type="text/javascript"></script>
        <script>
            params=[];
            window.location.search.replace("?","").split("&").forEach(param=>{parts=param.split("=");params[parts[0]]=parts[1];});
            showComp = params.comp ?? "league";
            
            allTeams = null;
            allSeasons = [];
                        
            compNav = document.getElementById("competitions");
            
            fetch("data/teams.json")
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    allTeams = data;
                    return fetch("data/seasons.json");
                })
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    allSeasons = data;
                    return fetch("data/winners.json");
                })
                .then(response => response.json())
                .then(data => {
                    doneFetch(data);
                });
        </script>
    </body>
</html>
