        <script>
            dataContainer = document.getElementById("dataContainer");
            keys = [];
            sectionNav = document.getElementById("competitions");
            
            params=[];
            window.location.search.replace("?","").split("&").forEach(param=>{parts=param.split("=");params[parts[0]]=parts[1];});
            club = params.club.toUpperCase();
            showSection = params.show ?? "history";
            allTeams = [];
            
            fetch("data/teams.json")
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    allTeams = data;
                    return fetch("data/clubs/"+getFolder(params.club)+"/"+params.club.toLowerCase()+".json")
                })
                .then(response => {
                    if ( ! response.ok ) {
                        errorP = document.createElement("P");
                        errorP.classList.add("error");
                        errorP.textContent = "Club not found";
                        document.body.append(errorP);
                        return {"invalid":true};
                    }
                    return response.json();
                })
                .then(data => {
                    if ( data.invalid ) {
                        return;
                    }
                    
                    doneFetch(data);
                });
        </script>
